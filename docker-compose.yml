services:
  api-gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "80:80"
    networks:
      - gateway-network
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./jwt-auth.lua:/etc/nginx/jwt-auth.lua:ro
    depends_on:
      - auth-api
      - orders-api
      - delivery-api
    platform: linux/arm64 # Use this line if you are on an ARM64 architecture (like M1/M2 Macs)
    build:
      dockerfile: Dockerfile
      args:
        - JWT_SECRET=${JWT_SECRET}

  auth-api:
    build:
      context: ./auth_api
      dockerfile: Dockerfile
    container_name: auth-api
    env_file:
      - ./auth_api/.env
    environment:
      - DB_CONNECTION_STRING=user=admin password=pass dbname=users_db sslmode=disable host=users-db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - users-db
    networks:
      - gateway-network
    ports:
      - "3000"

  users-db:
    image: postgres:latest
    container_name: users-db
    networks:
      - gateway-network
    environment:
      - POSTGRES_DB=users_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data

  orders-api:
    build:
      context: ./orders_api
      dockerfile: Dockerfile
    container_name: orders-api
    env_file:
      - ./orders_api/.env
    depends_on:
      - orders-db
      - rabbitmq
    environment:
      - DB_CONNECTION_STRING=user=admin password=pass dbname=orders_db sslmode=disable host=orders-db port=5433
      - JWT_SECRET=${JWT_SECRET}
      - RABBIT_CONNECTION=amqp://guest:guest@rabbitmq:5672/
      - RABBIT_DELIVERY_QUEUE=MS_DELIVERY_QUEUE
      - RABBIT_ORDER_QUEUE=RABBIT_ORDER_QUEUE
      - URL_GET_ESTABLISHMENT_ID=http://api-gateway/api/auth/establishments/%d
      - ABACATEPAY_API_KEY=${ABACATEPAY_API_KEY}
      - ABACATEPAY_WEBHOOK_SECRET=${ABACATEPAY_WEBHOOK_SECRET}
      - ABACATEPAY_RETURN_URL=${ABACATEPAY_RETURN_URL}
      - ABACATEPAY_COMPLETION_URL=${ABACATEPAY_COMPLETION_URL}
    networks:
      - gateway-network
    ports:
      - "3000"

  orders-db:
    image: postgres:latest
    container_name: orders-db
    networks:
      - gateway-network
    environment:
      - POSTGRES_DB=orders_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass
    ports:
      - "127.0.0.1:5433:5433"
    command: -p 5433
    volumes:
      - orders-db-data:/var/lib/postgresql/data

  delivery-api:
    build:
      context: ./delivery_api
      dockerfile: Dockerfile
    container_name: delivery-api
    env_file:
      - ./delivery_api/.env
    depends_on:
      - delivery-db
      - rabbitmq
    environment:
      - DB_CONNECTION_STRING=user=admin password=pass dbname=delivery_db sslmode=disable host=delivery-db port=5434
      - RABBIT_CONNECTION=amqp://guest:guest@rabbitmq:5672/
      - RABBIT_DELIVERY_QUEUE=MS_DELIVERY_QUEUE
      - RABBIT_ORDER_QUEUE=RABBIT_ORDER_QUEUE
    networks:
      - gateway-network
    ports:
      - "3000"

  delivery-db:
    image: postgres:latest
    container_name: delivery-db
    networks:
      - gateway-network
    environment:
      - POSTGRES_DB=delivery_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass
    ports:
      - "127.0.0.1:5434:5434"
    command: -p 5434
    volumes:
      - delivery-db-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    networks:
      - gateway-network
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"

networks:
  gateway-network:
    driver: bridge

volumes:
  users-db-data:
  orders-db-data:
  delivery-db-data:
